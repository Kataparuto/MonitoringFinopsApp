{% extends 'base.html' %}
{% block content %}
<h4>New Cost Record</h4>
<form method="POST">
    {% for field in form %}
    <div class="form-group">
        <label>{{ field.label }}</label>
        {{ field }}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-success">Create</button>
    <a href="/measurements/" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
